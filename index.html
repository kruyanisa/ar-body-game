<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Sarabun:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #1e293b; overflow: hidden; font-family: 'Poppins', 'Sarabun', sans-serif; touch-action: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        canvas { display: block; touch-action: none; }
        
        .btn { position: absolute; z-index: 10; padding: 10px 15px; font-size: 16px; font-weight: bold; border-radius: 8px; color: white; border: none; cursor: pointer; font-family: 'Sarabun', sans-serif; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn:hover { transform: scale(1.05); }
        #muteBtn { top: 20px; left: 20px; background: #ef4444; }
        #restartBtn { top: 20px; right: 120px; background: #3b82f6; }
        #endBtn { top: 20px; right: 20px; background: #64748b; }
    </style>
</head>
<body>
    
    <div id="game-container">
        <audio id="bgMusic" loop src="Poosaokalor.mp3"></audio>
        <button id="muteBtn" class="btn" onclick="toggleMute()">🔊 Mute</button>
        <button id="restartBtn" class="btn" onclick="restartGame()">🔄 เริ่มใหม่</button>
        <button id="endBtn" class="btn" onclick="forceEndGame()">🛑 จบเกม</button>
    </div>

<script>
    let video, poseNet, poses = [];
    let state = 'START'; 
    let score = 0, currentQuestion = 0, maxQuestions = 10;
    let targetWord = null, timeLeft = 8000, lastTime = 0;
    let currentChoices = [];
    let sessionVocab = []; 
    let vocabImages = {}; 
    
    let smoothedSensorPos = [0, 0];
    let selectionCooldown = 0; 
    let hoverTime = [0, 0, 0]; // เก็บเวลาทาบมือของทั้ง 3 ปุ่ม
    const HOVER_REQUIRED = 1000; // ต้องแช่มือ 1 วินาที (1000 ms)

    const vocabList = [
        { word: 'body' }, { word: 'head' }, { word: 'hair' }, { word: 'face' },
        { word: 'eye' }, { word: 'ear' }, { word: 'nose' }, { word: 'mouth' },
        { word: 'moustache' }, { word: 'cheek' }, { word: 'chin' }, { word: 'neck' },
        { word: 'shoulders' }, { word: 'arm' }, { word: 'hand' }, { word: 'hips' },
        { word: 'leg' }, { word: 'knees' }, { word: 'feet' }
    ];

    let osc, env, fireworks = [];

    function preload() {
        vocabList.forEach(v => {
            vocabImages[v.word] = loadImage(v.word + '.png');
        });
    }

    function setup() {
        let cnv = createCanvas(windowWidth, windowHeight);
        cnv.parent('game-container');
        cnv.style('touch-action', 'none'); 

        video = createCapture(VIDEO);
        video.size(windowWidth, windowHeight);
        poseNet = ml5.poseNet(video, () => console.log('Model Loaded'));
        poseNet.on('pose', results => poses = results);
        video.hide();
        
        osc = new p5.Oscillator();
        env = new p5.Envelope();
        osc.start();
        osc.amp(env);
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        video.size(windowWidth, windowHeight);
    }

    function playSound(type) {
        if (type === 'correct') {
            osc.setType('sine'); osc.freq(880); env.play(osc, 0, 0.1, 0.1, 0.1, 0);
        } else if (type === 'wrong') {
            osc.setType('sawtooth'); osc.freq(150); env.play(osc, 0, 0.1, 0.3, 0.1, 0);
        } else if (type === 'win') {
            osc.setType('triangle');
            setTimeout(() => { osc.freq(523.25); env.play(osc, 0, 0.1, 0.1, 0.1, 0); }, 0);
            setTimeout(() => { osc.freq(1046.50); env.play(osc, 0, 0.1, 0.3, 0.5, 0); }, 300);
        }
    }

    function nextQuestion() {
        if (currentQuestion >= maxQuestions) {
            state = 'END';
            if (score >= maxQuestions / 2) playSound('win');
            return;
        }
        targetWord = sessionVocab[currentQuestion];
        let distractors = shuffle(vocabList.filter(v => v.word !== targetWord.word)).slice(0, 2);
        currentChoices = shuffle([targetWord, distractors[0], distractors[1]]);
        timeLeft = 8000;
        lastTime = millis();
        currentQuestion++;
        
        hoverTime = [0, 0, 0]; // รีเซ็ตหลอดพลัง
        selectionCooldown = millis() + 500; // พักครึ่งวินาทีก่อนเริ่มรับคำตอบข้อใหม่
    }

    function mousePressed(event) {
        if (event && event.target && event.target.tagName === 'BUTTON') return; 
        userStartAudio(); 
        if (state === 'START') { 
            state = 'PLAY'; 
            sessionVocab = shuffle([...vocabList]).slice(0, maxQuestions);
            nextQuestion(); 
            document.getElementById('bgMusic').play().catch(e => console.log(e));
        } else if (state === 'END') { 
            restartGame();
        }
    }

    function toggleMute() {
        let music = document.getElementById('bgMusic');
        let btn = document.getElementById('muteBtn');
        if (music.paused) { music.play(); btn.innerText = "🔊 Mute"; btn.style.background = "#ef4444"; } 
        else { music.pause(); btn.innerText = "🔇 Play"; btn.style.background = "#10b981"; }
    }
    
    function restartGame() {
        state = 'PLAY'; score = 0; currentQuestion = 0; fireworks = []; smoothedSensorPos = [0, 0];
        hoverTime = [0, 0, 0];
        sessionVocab = shuffle([...vocabList]).slice(0, maxQuestions);
        document.getElementById('bgMusic').currentTime = 0;
        document.getElementById('bgMusic').play().catch(e => console.log(e));
        nextQuestion();
    }
    
    function forceEndGame() {
        state = 'END'; currentQuestion = maxQuestions; fireworks = [];
        document.getElementById('bgMusic').pause();
    }

    function draw() {
        push(); translate(width, 0); scale(-1, 1); image(video, 0, 0, width, height); pop();
        fill(0, 0, 0, 150); rect(0, 0, width, height); 

        if (state === 'START') {
            drawUI('Touch to Start', 'แตะหน้าจอเพื่อเริ่มเกม!', 40, width/2, height/2);
        } else if (state === 'PLAY') {
            runGameLogic();
            drawGameUI();
        } else if (state === 'END') {
            drawUI('GAME OVER', `Score: ${score}/${maxQuestions}\nTap to Try Again`, 50, width/2, height/2, score >= 5 ? '#10b981' : '#ef4444');
            if (score >= maxQuestions / 2) runFireworks();
        }
    }

    function runGameLogic() {
        let dt = millis() - lastTime;
        lastTime = millis();
        timeLeft -= dt;

        if (timeLeft <= 0) { playSound('wrong'); nextQuestion(); return; }

        let activeWrist = null;

        if (poses.length > 0) {
            let pose = poses[0].pose;
            let lw = pose.leftWrist;
            let rw = pose.rightWrist;
            let le = pose.leftElbow;
            let re = pose.rightElbow;
            
            // กฎเหล็กข้อที่ 1: ความแม่นยำต้อง > 70% และ มือต้องอยู่สูงกว่าข้อศอก (y น้อยกว่าคืออยู่สูงกว่า)
            let leftValid = lw.confidence > 0.7 && lw.y < le.y + 30; 
            let rightValid = rw.confidence > 0.7 && rw.y < re.y + 30;

            if (leftValid || rightValid) {
                if (leftValid && rightValid) {
                    activeWrist = lw.y < rw.y ? lw : rw; // ถ้าทััง 2 มือผ่านเกณฑ์ ให้เลือกมือที่ยกสูงกว่า
                } else {
                    activeWrist = leftValid ? lw : rw;
                }
            }
        }

        if (activeWrist) {
            smoothedSensorPos[0] = lerp(smoothedSensorPos[0], width - activeWrist.x, 0.3);
            smoothedSensorPos[1] = lerp(smoothedSensorPos[1], activeWrist.y, 0.3);
            
            let isHovering = false;

            if (millis() > selectionCooldown) {
                for (let i = 0; i < 3; i++) {
                    let hitAreaX = currentChoices[i].hitW || 120;
                    let hitAreaY = currentChoices[i].hitH || 60;
                    
                    if (abs(smoothedSensorPos[0] - currentChoices[i].cx) < hitAreaX && abs(smoothedSensorPos[1] - currentChoices[i].cy) < hitAreaY) { 
                        isHovering = true;
                        hoverTime[i] += dt; // ชาร์จพลังหลอดสีเขียว
                        
                        // กฎเหล็กข้อที่ 2: ต้องแช่มือให้หลอดเต็ม 1 วินาที
                        if (hoverTime[i] >= HOVER_REQUIRED) {
                            if (currentChoices[i].word === targetWord.word) {
                                score++; playSound('correct');
                            } else {
                                playSound('wrong');
                            }
                            nextQuestion();
                            return;
                        }
                    } else {
                        hoverTime[i] = max(0, hoverTime[i] - dt * 3); // ถ้าเอามือออก หลอดจะค่อยๆ ลดลงอย่างรวดเร็ว
                    }
                }
            }

            if (!isHovering) {
                for (let i = 0; i < 3; i++) hoverTime[i] = max(0, hoverTime[i] - dt * 3);
            }
        } else {
            // ถ้ายกมือลงจนกล้องจับไม่เจอ ให้รีเซ็ตหลอดพลังทั้งหมด
            for (let i = 0; i < 3; i++) hoverTime[i] = max(0, hoverTime[i] - dt * 3);
        }
    }

    function drawGameUI() {
        fill(255); textAlign(LEFT, TOP); textSize(24); textStyle(BOLD); text(`Score: ${score}`, 20, 80); 
        textAlign(RIGHT, TOP); text(`${currentQuestion} / ${maxQuestions}`, width - 20, 80);
        
        let seconds = Math.ceil(timeLeft / 1000);
        textAlign(CENTER, TOP); textSize(30); fill(255); text(`Time: ${seconds}s`, width/2, 80);

        let img = vocabImages[targetWord.word];
        if (img && img.width > 0) {
            imageMode(CENTER);
            image(img, width/2, height/2 - 40, 180, 180); 
            imageMode(CORNER);
        } else {
            textAlign(CENTER, CENTER); textSize(40); fill(255, 255, 255, 150);
            text("[ รูป " + targetWord.word + ".png ]", width/2, height/2 - 40);
        }

        let screenPadding = width * 0.05; 
        let boxW = min(200, width * 0.26); 
        let boxH = min(70, height * 0.12);
        
        let availableWidth = width - (screenPadding * 2);
        let gap = (availableWidth - (boxW * 3)) / 2; 
        let startX = screenPadding; 

        for (let i = 0; i < 3; i++) {
            let cx = startX + i * (boxW + gap) + boxW / 2;
            let cy = height - boxH - 40; 
            
            currentChoices[i].cx = cx; 
            currentChoices[i].cy = cy;
            currentChoices[i].hitW = boxW / 2 + 15; 
            currentChoices[i].hitH = boxH / 2 + 15;

            // คำนวณเปอร์เซ็นต์ความคืบหน้าของหลอดสีเขียว
            let progress = constrain(hoverTime[i] / HOVER_REQUIRED, 0, 1);

            rectMode(CENTER); 
            fill(255, 255, 255, 200); stroke(0); strokeWeight(2);
            rect(cx, cy, boxW, boxH, 15);

            // แสดงเอฟเฟกต์สีเขียวโหลดขึ้นมาเมื่อทาบมือ
            if (progress > 0) {
                rectMode(CORNER);
                fill(16, 185, 129, 180); // สีเขียว
                noStroke();
                rect(cx - boxW/2, cy - boxH/2, boxW * progress, boxH, 15);
                rectMode(CENTER);
            }

            fill(0); noStroke(); textSize(min(24, boxW * 0.18)); textAlign(CENTER, CENTER);
            text(currentChoices[i].word.toUpperCase(), cx, cy);
            rectMode(CORNER);
        }
    }

    function drawUI(t1, t2, size, x, y, c = '#38bdf8') {
        textAlign(CENTER, CENTER); textStyle(BOLD);
        fill(c); textSize(size); text(t1, x, y - 30); fill(255); textSize(20); text(t2, x, y + 40);
    }

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex); currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    class Particle {
        constructor(x, y, c) { this.x = x; this.y = y; this.vx = random(-5, 5); this.vy = random(-5, 5); this.alpha = 255; this.c = c; }
        update() { this.x += this.vx; this.y += this.vy; this.alpha -= 5; }
        show() { noStroke(); fill(this.c[0], this.c[1], this.c[2], this.alpha); ellipse(this.x, this.y, 8); }
    }
    
    function runFireworks() {
        if (random(1) < 0.1) {
            let c = [random(255), random(255), random(255)];
            let x = random(width), y = random(height/2);
            for(let i=0; i<30; i++) fireworks.push(new Particle(x, y, c));
        }
        for (let i = fireworks.length - 1; i >= 0; i--) {
            fireworks[i].update(); fireworks[i].show();
            if (fireworks[i].alpha <= 0) fireworks.splice(i, 1);
        }
    }
</script>
</body>
</html>
