<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; background-color: #1e293b; overflow: hidden; font-family: 'Poppins', 'Sarabun', sans-serif; touch-action: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        canvas { display: block; touch-action: none; }
        
        .btn { position: absolute; z-index: 10; padding: 10px 15px; font-size: 16px; font-weight: bold; border-radius: 8px; color: white; border: none; cursor: pointer; font-family: 'Sarabun', sans-serif; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn:hover { transform: scale(1.05); }
        #muteBtn { top: 20px; left: 20px; background: #ef4444; }
        #restartBtn { top: 20px; right: 135px; background: #3b82f6; }
        #endBtn { top: 20px; right: 20px; background: #64748b; }

        /* ส่วนแสดงชื่อผู้เล่นด้านบนจอ */
        .header-container { position: absolute; top: 20px; left: 140px; z-index: 10; font-family: 'Sarabun'; }
        .welcome-text { font-size: 14px; font-weight: bold; color: #3730a3; background: #e0e7ff; padding: 6px 15px; border-radius: 50px; border: 1px solid #c7d2fe; display: inline-block; }

        /* CSS ระบบการส่งคะแนนและ Modal ส่วนเสริม */
        #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(5px); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; display: none; }
        .modal-box-login { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); border: 3px solid #6366f1; text-align: center; }
        .modal-box-login h2 { margin-top: 0; color: #4f46e5; font-family: 'Sarabun'; font-size: 24px; }
        .modal-box-login p { color: #64748b; font-size: 14px; margin-bottom: 20px; }
        .modal-box-login input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; text-align: center; box-sizing: border-box; font-family: 'Sarabun'; transition: 0.2s; }
        .modal-box-login input:focus { border-color: #6366f1; outline: none; }
        .modal-box-login button { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #4338ca; }
        .modal-box-login button:hover { background: #4f46e5; transform: translateY(-2px); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 41, 59, 0.9); display: flex; justify-content: center; align-items: center; z-index: 1999; visibility: hidden; opacity: 0; transition: opacity 0.3s; backdrop-filter: blur(3px); }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-box { background: white; padding: 35px; border-radius: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); max-width: 360px; width: 90%; border: 4px solid #a5b4fc; font-family: 'Sarabun'; }
        .modal-box h2 { color: #4f46e5; margin-top: 0; font-size: 32px; font-weight: 800; }
        .score-display { font-size: 22px; color: #334155; margin: 20px 0; font-weight: bold; line-height: 1.6; }
        .score-number { color: #4f46e5; font-size: 48px; display: inline-block; margin: 0 5px; font-weight: 800; }
        .modal-btn { background: #10b981; color: white; border: none; border-radius: 12px; padding: 12px 25px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 #059669; transition: all 0.1s; width: 100%; font-family: 'Sarabun'; }
        .modal-btn:hover { background: #059669; transform: translateY(-2px); }
        .saving-text { font-size: 18px; color: #4f46e5; margin-top: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>
    
    <div id="game-container">
        <div class="header-container">
            <div id="welcome-section" style="display: none;">
                <div class="welcome-text">👤 ผู้เล่น: <span id="show_name"></span></div>
            </div>
        </div>

        <audio id="bgMusic" loop src="Poosaokalor.mp3"></audio>
        <button id="muteBtn" class="btn" onclick="toggleMute()">🔊 Mute</button>
        <button id="restartBtn" class="btn" style="display:none;" onclick="restartGame()">🔄 เริ่มใหม่</button>
        <button id="endBtn" class="btn" style="display:none;" onclick="forceEndGame()">🛑 จบเกม</button>
    </div>

    <div id="login-modal">
        <div class="modal-box-login">
            <h2>👋 ลงชื่อก่อนส่งคะแนน</h2>
            <p>กรุณากรอกข้อมูลเพื่อบันทึกคะแนนเข้าสู่ระบบครับ</p>
            <input type="text" id="m_name" placeholder="ชื่อ - นามสกุล" autocomplete="name">
            <input type="text" id="m_room" placeholder="ชั้น/ห้อง (เช่น ม.5/1)">
            <input type="text" id="m_id" placeholder="รหัสนักเรียน (5 หลัก)" maxlength="5" autocomplete="username" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            <button onclick="saveModalData()">🚀 ยืนยันและส่งคะแนน</button>
            <div id="modal-err" style="color:#ef4444; font-size:14px; margin-top:10px; display:none;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="scoreModal">
        <div class="modal-box">
            <h2>🎉 Finished!</h2>
            <div class="score-display">
                คุณตอบถูกทั้งหมด<br>
                <span class="score-number" id="finalScore">0</span> / 10 ข้อ
            </div>
            <div id="saveStatus" class="saving-text">⏳ กำลังบันทึกคะแนน...</div>
            <button class="modal-btn" id="playAgainBtn" onclick="closeScoreModalAndRestart()" style="display:none;">🚀 เล่นอีกครั้ง</button>
        </div>
    </div>

<script>
    // === ลิงก์เชื่อมโยงไปยัง Google Apps Script Web App ของคุณคุณครู ===
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxd_UGE1ZY_1dcB3B7l0Vy8azxhuuFoc_kftJ7QZ1Nc4XIaXGKF9RPs8WxhZ0K5VyVN/exec';
    const LESSON_NAME = "My Body Part Game (Normal Mode)";

    let studentData = { name: "", room: "", id: "" };
    let video = null;
    let poseNet = null;
    let poses = [];
    let state = 'START_MENU'; 
    let score = 0, currentQuestion = 0, maxQuestions = 10;
    let targetWord = null, timeLeft = 8000, lastTime = 0;
    let currentChoices = [];
    let sessionVocab = []; 
    let vocabImages = {}; 
    
    let bgMenuImage;   
    let bgNormalImage; 
    
    let smoothedSensorPos = [320, 1000]; 
    
    let isFeedbackState = false;
    let feedbackTimer = 0;
    let selectedButtonIndex = -1;
    let isCorrectAnswer = false;

    let countdownNum = 3;
    let countdownTimer = 0;
    let questionStartTime = 0; 
    let isNoCameraMode = false;

    const vocabList = [
        { word: 'body' }, { word: 'head' }, { word: 'hair' }, { word: 'face' },
        { word: 'eye' }, { word: 'ear' }, { word: 'nose' }, { word: 'mouth' },
        { word: 'moustache' }, { word: 'cheek' }, { word: 'chin' }, { word: 'neck' },
        { word: 'shoulders' }, { word: 'arm' }, { word: 'hand' }, { word: 'hips' },
        { word: 'leg' }, { word: 'knees' }, { word: 'feet' }
    ];

    let osc, env, fireworks = [];

    // เรียกโหลดความจำเก่าของนักเรียนตั้งแต่เปิดหน้าเว็บขึ้นมา
    window.onload = function() {
        if(localStorage.getItem('studentName')) {
            studentData.name = localStorage.getItem('studentName');
            studentData.room = localStorage.getItem('studentRoom');
            studentData.id = localStorage.getItem('studentId');
            
            document.getElementById('show_name').innerText = studentData.name;
            document.getElementById('welcome-section').style.display = 'block';
        }

        // ฝังฟังก์ชันจัดฟอร์แมตห้องอัตโนมัติ (Smart Auto-Format) เมื่อเมาส์คลิกออกจากช่องกรอกห้อง
        document.getElementById('m_room').addEventListener('blur', function() {
            this.value = autoFormatRoom(this.value);
        });
    };

    // ตัวแปลงฟอร์แมตห้องอัจฉริยะดึงเฉพาะตัวเลขมาเรียงเป็น ม.X/Y
    function autoFormatRoom(val) {
        let cleanVal = val.trim();
        let numbers = cleanVal.match(/\d+/g);
        if (numbers && numbers.length >= 2) {
            return `ม.${numbers[0]}/${numbers[1]}`;
        } else if (numbers && numbers.length === 1) {
            return `ม.${numbers[0]}`;
        }
        return cleanVal;
    }

    function preload() {
        vocabList.forEach(v => {
            vocabImages[v.word] = loadImage(v.word + '.png');
        });
        bgMenuImage = loadImage('bg_menu.jpg'); 
        bgNormalImage = loadImage('bg_normal.jpg'); 
    }

    function setup() {
        let cnv = createCanvas(windowWidth, windowHeight);
        cnv.parent('game-container');
        cnv.style('touch-action', 'none'); 
        
        osc = new p5.Oscillator();
        env = new p5.Envelope();
        osc.start();
        osc.amp(env);
        
        smoothedSensorPos = [width / 2, height + 200];
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        if (video) video.size(windowWidth, windowHeight);
    }

    function initCameraAndStart() {
        isNoCameraMode = false;
        state = 'LOADING_CAMERA'; 
        
        video = createCapture(VIDEO, function() {
            poseNet = ml5.poseNet(video, function() {
                console.log('AI Model Loaded');
                startCountdown(); 
            });
            poseNet.on('pose', function(results) { poses = results; });
            video.hide();
        });
        video.size(windowWidth, windowHeight);
    }

    function playSound(type) {
        if (type === 'click') {
            osc.setType('triangle'); osc.freq(587.33); env.play(osc, 0, 0.05, 0.1, 0.05, 0);
        } else if (type === 'correct') {
            osc.setType('sine'); osc.freq(880); env.play(osc, 0, 0.1, 0.1, 0.1, 0);
        } else if (type === 'wrong') {
            osc.setType('sawtooth'); osc.freq(150); env.play(osc, 0, 0.1, 0.3, 0.1, 0);
        } else if (type === 'win') {
            osc.setType('triangle');
            setTimeout(() => { osc.freq(523.25); env.play(osc, 0, 0.1, 0.1, 0.1, 0); }, 0);
            setTimeout(() => { osc.freq(1046.50); env.play(osc, 0, 0.1, 0.3, 0.5, 0); }, 300);
        }
    }

    function startCountdown() {
        sessionVocab = shuffle([...vocabList]).slice(0, maxQuestions); 
        currentQuestion = 0;
        score = 0;
        
        state = 'COUNTDOWN';
        countdownNum = 3;
        countdownTimer = millis() + 1000;
        smoothedSensorPos = [width / 2, height + 200]; 
        
        document.getElementById('restartBtn').style.display = 'block';
        document.getElementById('endBtn').style.display = 'block';
    }

    function nextQuestion() {
        if (currentQuestion >= maxQuestions) {
            state = 'END';
            if (score >= maxQuestions / 2) playSound('win');
            
            // --- เงื่อนไขการส่งคะแนนเข้า Google Sheet (เฉพาะโหมดปิดกล้องปกติ) ---
            if (isNoCameraMode) {
                document.getElementById('finalScore').innerText = score;
                if (studentData.id) {
                    document.getElementById('scoreModal').classList.add('active');
                    submitGameScore();
                } else {
                    document.getElementById('login-modal').style.display = 'flex';
                }
            }
            return;
        }
        targetWord = sessionVocab[currentQuestion];
        let distractors = shuffle(vocabList.filter(v => v.word !== targetWord.word)).slice(0, 2);
        currentChoices = shuffle([targetWord, distractors[0], distractors[1]]);
        timeLeft = 8000;
        lastTime = millis();
        currentQuestion++;
        
        isFeedbackState = false;
        selectedButtonIndex = -1;
        questionStartTime = millis() + 500;
    }

    function mousePressedOnMenu(x, y) {
        if (y > height * 0.3) { 
            if (x < width / 2) {
                playSound('click');
                initCameraAndStart();
            } else {
                playSound('click');
                isNoCameraMode = true;
                startCountdown();
            }
        }
    }

    function mousePressed(event) {
        // บล็อกไม่ให้ P5 ตรวจจับการคลิกทะลุลงไปโดนปุ่ม HTML ของระบบส่งคะแนน
        if (event && event.target && (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT')) return; 
        userStartAudio(); 
        
        let cx = (touches.length > 0) ? touches[0].x : mouseX;
        let cy = (touches.length > 0) ? touches[0].y : mouseY;

        if (state === 'START_MENU') {
            mousePressedOnMenu(cx, cy);
            document.getElementById('bgMusic').play().catch(e => console.log(e));
        } else if (state === 'END') { 
            // โหมด AR คลิกเพื่อเริ่มใหม่ได้ปกติ แต่โหมดส่งคะแนนจะทำงานผ่านปุ่มของ Modal แทน
            if (!isNoCameraMode) restartGame();
        }
    }

    // ฟังก์ชันจัดการบันทึกข้อมูลและแปลงฟอร์แมตห้องเมื่อกดปุ่มยืนยัน
    function saveModalData() {
        let n = document.getElementById('m_name').value.trim();
        let r = document.getElementById('m_room').value.trim();
        let i = document.getElementById('m_id').value.trim();
        let err = document.getElementById('modal-err');

        // รันฟอร์แมตห้องซ้ำอีกรอบเพื่อความชัวร์ 100% ก่อนส่งข้อมูลลงระบบ
        r = autoFormatRoom(r);
        document.getElementById('m_room').value = r;

        if(!n || !r || i.length !== 5) {
            err.innerText = "กรุณากรอกข้อมูลให้ครบ และรหัสต้องมี 5 หลักครับ!";
            err.style.display = 'block';
            return;
        }

        err.style.display = 'none';
        studentData = { name: n, room: r, id: i };

        localStorage.setItem('studentName', n);
        localStorage.setItem('studentRoom', r);
        localStorage.setItem('studentId', i);

        document.getElementById('show_name').innerText = n;
        document.getElementById('welcome-section').style.display = 'block';
        document.getElementById('login-modal').style.display = 'none';
        
        document.getElementById('scoreModal').classList.add('active');
        submitGameScore();
    }

    // สคริปต์ยิงข้อมูลคะแนนเข้าสู่ระบบ Google Sheets แบบ no-cors
    async function submitGameScore() {
        let stat = document.getElementById('saveStatus');
        let playBtn = document.getElementById('playAgainBtn');
        
        stat.style.display = 'block';
        stat.innerText = "⏳ กำลังบันทึกคะแนน...";
        stat.style.color = "#4f46e5";
        playBtn.style.display = 'none';

        const payload = { 
            name: studentData.name, 
            room: studentData.room, 
            studentId: "'" + studentData.id, 
            lesson: LESSON_NAME, 
            score: score,
            maxScore: maxQuestions,
            _t: new Date().getTime() 
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors', cache: 'no-store',
                body: JSON.stringify(payload),
                headers: { "Content-Type": "text/plain;charset=utf-8" } 
            });
            stat.innerText = '✅ บันทึกคะแนนลงระบบเรียบร้อย!';
            stat.style.color = '#10b981';
        } catch(error) {
            stat.innerText = '❌ ส่งข้อมูลไม่สำเร็จ';
            stat.style.color = '#ef4444';
        } finally {
            playBtn.style.display = 'inline-block';
        }
    }

    function closeScoreModalAndRestart() {
        document.getElementById('scoreModal').classList.remove('active');
        document.getElementById('saveStatus').style.display = 'none';
        restartGame();
    }

    function toggleMute() {
        let music = document.getElementById('bgMusic');
        let btn = document.getElementById('muteBtn');
        if (music.paused) { music.play(); btn.innerText = "🔊 Mute"; btn.style.background = "#ef4444"; } 
        else { music.pause(); btn.innerText = "🔇 Play"; btn.style.background = "#10b981"; }
    }
    
    function restartGame() {
        score = 0; currentQuestion = 0; fireworks = []; 
        smoothedSensorPos = [width / 2, height + 200];
        isFeedbackState = false;
        document.getElementById('bgMusic').currentTime = 0;
        document.getElementById('bgMusic').play().catch(e => console.log(e));
        
        startCountdown();
    }
    
    function forceEndGame() {
        state = 'END'; currentQuestion = maxQuestions; fireworks = [];
        document.getElementById('bgMusic').pause();
        if (isNoCameraMode) {
            document.getElementById('finalScore').innerText = score;
            if (studentData.id) {
                document.getElementById('scoreModal').classList.add('active');
                submitGameScore();
            } else {
                document.getElementById('login-modal').style.display = 'flex';
            }
        }
    }

    function draw() {
        if (state === 'START_MENU' || state === 'LOADING_CAMERA') {
            if (bgMenuImage && bgMenuImage.width > 0) {
                image(bgMenuImage, 0, 0, width, height);
                fill(0, 0, 0, 100); rect(0, 0, width, height); 
            } else {
                background('#1e293b');
            }
        } else if (state === 'END') {
            background('#1e293b');
        } else if (isNoCameraMode) {
            if (bgNormalImage && bgNormalImage.width > 0) {
                image(bgNormalImage, 0, 0, width, height);
                fill(0, 0, 0, 80); rect(0, 0, width, height); 
            } else {
                background('#1e293b'); 
            }
        } else if (video) {
            push(); translate(width, 0); scale(-1, 1); image(video, 0, 0, width, height); pop();
            fill(0, 0, 0, 150); rect(0, 0, width, height); 
        }

        if (state === 'START_MENU') {
            drawStartMenuUI();
        } else if (state === 'LOADING_CAMERA') {
            drawLoadingUI();
        } else if (state === 'COUNTDOWN') {
            runCountdownLogic();
            drawCountdownUI();
        } else if (state === 'PLAY') {
            runGameLogic();
            drawGameUI();
        } else if (state === 'END') {
            // ในโหมดกล้องจะวาดหน้าจอนี้ แต่ถ้าโหมดปิดกล้องจะเห็นกล่อง HTML วิ่งขึ้นมาทับด้านบนแทน
            drawUI('Result!', `Quiz Completed!\nScore: ${score}/${maxQuestions}\nTap to Try Again`, 50, width/2, height/2, score >= 5 ? '#10b981' : '#ef4444');
            if (score >= maxQuestions / 2) runFireworks();
        }
    }

    function drawLoadingUI() {
        textAlign(CENTER, CENTER);
        textStyle(BOLD);
        fill(255); textSize(30);
        text("กำลังขอสิทธิ์เปิดกล้องและโหลดระบบ AI...\n(กรุณากด 'อนุญาต/Allow' บนเบราว์เซอร์)", width/2, height/2);
    }

    function drawStartMenuUI() {
        textAlign(CENTER, CENTER);
        textStyle(BOLD);
        
        fill(56, 189, 248); textSize(50);
        text('My Body AR Game', width/2, height/2 - 120);
        
        fill(255); textSize(24);
        text('กรุณาเลือกโหมดการเล่น (Select Game Mode)', width/2, height/2 - 60);

        let boxW = min(300, width * 0.4);
        let boxH = 150;
        let leftBtnX = width/2 - boxW/2 - 20;
        let rightBtnX = width/2 + boxW/2 + 20;
        let btnY = height/2 + 50;

        let hoverLeft = (mouseX > leftBtnX - boxW/2 && mouseX < leftBtnX + boxW/2 && mouseY > btnY - boxH/2 && mouseY < btnY + boxH/2);
        let hoverRight = (mouseX > rightBtnX - boxW/2 && mouseX < rightBtnX + boxW/2 && mouseY > btnY - boxH/2 && mouseY < btnY + boxH/2);

        rectMode(CENTER); noStroke();

        fill(10, 110, 65); rect(leftBtnX, btnY + 10, boxW, boxH, 20); 
        if (hoverLeft) {
            fill(25, 215, 150); rect(leftBtnX, btnY + 4, boxW, boxH, 20); 
        } else {
            fill(16, 185, 129); rect(leftBtnX, btnY, boxW, boxH, 20); 
        }
        fill(255); textSize(24); text('เล่นแบบเปิดกล้อง', leftBtnX, btnY - 15 + (hoverLeft ? 4 : 0));
        textSize(16); textStyle(NORMAL); text('(ขยับร่างกายตอบ)', leftBtnX, btnY + 25 + (hoverLeft ? 4 : 0));

        textStyle(BOLD);
        fill(25, 75, 170); rect(rightBtnX, btnY + 10, boxW, boxH, 20); 
        if (hoverRight) {
            fill(80, 165, 255); rect(rightBtnX, btnY + 4, boxW, boxH, 20); 
        } else {
            fill(59, 130, 246); rect(rightBtnX, btnY, boxW, boxH, 20); 
        }
        fill(255); textSize(24); text('เล่นแบบปิดกล้อง', rightBtnX, btnY - 15 + (hoverRight ? 4 : 0));
        textSize(16); textStyle(NORMAL); text('(ใช้นิ้วจิ้ม/เมาส์คลิก)', rightBtnX, btnY + 25 + (hoverRight ? 4 : 0));
        
        rectMode(CORNER); 
    }

    function runCountdownLogic() {
        if (millis() > countdownTimer) {
            countdownNum--;
            countdownTimer = millis() + 1000;
            if (countdownNum <= 0) {
                state = 'PLAY';
                nextQuestion();
            }
        }
    }

    function drawCountdownUI() {
        textAlign(CENTER, CENTER);
        textStyle(BOLD);
        fill('#f59e0b');
        textSize(120);
        text(countdownNum, width/2, height/2);
    }

    function runGameLogic() {
        let dt = millis() - lastTime;
        lastTime = millis();

        if (isFeedbackState) {
            if (millis() > feedbackTimer) {
                nextQuestion(); 
            }
            return; 
        }

        timeLeft -= dt;
        if (timeLeft <= 0) { playSound('wrong'); nextQuestion(); return; }

        let active = false;
        let sensorPos = [0, 0];

        if (isNoCameraMode) {
            if (touches.length > 0) {
                sensorPos = [touches[0].x, touches[0].y];
                active = true;
            } else if (mouseIsPressed) {
                sensorPos = [mouseX, mouseY];
                active = true;
            }
        } else if (poses.length > 0) {
            let lw = poses[0].pose.leftWrist;
            let rw = poses[0].pose.rightWrist;
            
            if (lw.confidence > 0.4 || rw.confidence > 0.4) {
                let activeWrist = (lw.confidence > rw.confidence) ? lw : rw;
                sensorPos = [width - activeWrist.x, activeWrist.y - 150]; 
                active = true;
            }
        }

        if (active) {
            if (isNoCameraMode) {
                smoothedSensorPos[0] = sensorPos[0];
                smoothedSensorPos[1] = sensorPos[1];
            } else {
                smoothedSensorPos[0] = lerp(smoothedSensorPos[0], sensorPos[0], 0.3);
                smoothedSensorPos[1] = lerp(smoothedSensorPos[1], sensorPos[1], 0.3);
            }

            if (millis() < questionStartTime) return;

            for (let i = 0; i < 3; i++) {
                let hitW = currentChoices[i].hitW || 120;
                let hitH = currentChoices[i].hitH || 60;
                
                if (abs(smoothedSensorPos[0] - currentChoices[i].cx) < hitW && abs(smoothedSensorPos[1] - currentChoices[i].cy) < hitH) { 
                    selectedButtonIndex = i;
                    
                    if (currentChoices[i].word === targetWord.word) {
                        score++; playSound('correct');
                        isCorrectAnswer = true;
                    } else {
                        playSound('wrong');
                        isCorrectAnswer = false;
                    }
                    
                    isFeedbackState = true;
                    feedbackTimer = millis() + 1500; 
                    return; 
                }
            }
        }
    }

    function drawGameUI() {
        fill(255); textAlign(LEFT, TOP); textSize(24); textStyle(BOLD); text(`Score: ${score}`, 20, 90); 
        textAlign(RIGHT, TOP); text(`${currentQuestion} / ${maxQuestions}`, width - 20, 90);
        
        let seconds = Math.ceil(timeLeft / 1000);
        textAlign(CENTER, TOP); textSize(30); fill(255); text(`Time: ${seconds}s`, width/2, 90);

        let img = vocabImages[targetWord.word];
        if (img && img.width > 0) {
            imageMode(CENTER);
            image(img, width/2, height - 130, 180, 180); 
            imageMode(CORNER);
        } else {
            textAlign(CENTER, CENTER); textSize(40); fill(255, 255, 255, 150);
            text("[ รูป " + targetWord.word + ".png ]", width/2, height - 130);
        }

        let screenPadding = width * 0.05; 
        let boxW = min(200, width * 0.26); 
        let boxH = min(70, height * 0.12);
        
        let availableWidth = width - (screenPadding * 2);
        let gap = (availableWidth - (boxW * 3)) / 2; 
        let startX = screenPadding; 

        for (let i = 0; i < 3; i++) {
            let cx = startX + i * (boxW + gap) + boxW / 2;
            let cy = 160; 
            
            currentChoices[i].cx = cx; 
            currentChoices[i].cy = cy;
            currentChoices[i].hitW = boxW / 2 + 30; 
            currentChoices[i].hitH = boxH / 2 + 30;

            rectMode(CENTER); 
            
            // วาดเส้นประรอบกล่องเมื่อใช้โหมดเปิดกล้อง (ไว้เช็ก Issue การลั่น)
            if (!isNoCameraMode) {
                push();
                stroke(0, 255, 0, 150); 
                strokeWeight(2);
                drawingContext.setLineDash([5, 5]);
                noFill();
                rect(cx, cy, currentChoices[i].hitW * 2, currentChoices[i].hitH * 2, 20);
                drawingContext.setLineDash([]);
                pop();
            }

            if (isFeedbackState && i === selectedButtonIndex) {
                if (isCorrectAnswer) {
                    fill(46, 204, 113); 
                } else {
                    fill(231, 76, 60); 
                }
            } else {
                fill(255, 255, 255, 240); 
            }
            
            stroke(0); strokeWeight(2);
            rect(cx, cy, boxW, boxH, 15);

            if (isFeedbackState && i === selectedButtonIndex) fill(255);
            else fill(0);
            
            noStroke(); textSize(min(24, boxW * 0.18)); textAlign(CENTER, CENTER);
            text(currentChoices[i].word.toUpperCase(), cx, cy);
            rectMode(CORNER);
        }

        // วาดเป้าเล็งสีแดงตรงปลายนิ้วในโหมดกล้องปกติ
        if (!isNoCameraMode && smoothedSensorPos[1] < height) {
            push();
            let px = smoothedSensorPos[0];
            let py = smoothedSensorPos[1];
            
            fill(255, 50, 50, 200); noStroke();
            circle(px, py, 15);
            
            stroke(255, 50, 50, 200); strokeWeight(3);
            line(px - 20, py, px + 20, py);
            line(px, py - 20, px, py + 20);
            pop();
        }
    }

    function drawUI(t1, t2, size, x, y, c = '#38bdf8') {
        textAlign(CENTER, CENTER); textStyle(BOLD);
        fill(c); textSize(size); text(t1, x, y - 30); fill(255); textSize(20); text(t2, x, y + 40);
    }

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex); currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    class Particle {
        constructor(x, y, c) { this.x = x; this.y = y; this.vx = random(-5, 5); this.vy = random(-5, 5); this.alpha = 255; this.c = c; }
        update() { this.x += this.vx; this.y += this.vy; this.alpha -= 5; }
        show() { noStroke(); fill(this.c[0], this.c[1], this.c[2], this.alpha); ellipse(this.x, this.y, 8); }
    }
    
    function runFireworks() {
        if (random(1) < 0.1) {
            let c = [random(255), random(255), random(255)];
            let x = random(width), y = random(height/2);
            for(let i=0; i<30; i++) fireworks.push(new Particle(x, y, c));
        }
        for (let i = fireworks.length - 1; i >= 0; i--) {
            fireworks[i].update(); fireworks[i].show();
            if (fireworks[i].alpha <= 0) fireworks.splice(i, 1);
        }
    }
</script>
